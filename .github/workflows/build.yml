name: Build EXE

on:
 push:
   branches:
     - main

jobs:
 build:

   runs-on: windows-latest

   steps:

   - uses: actions/checkout@v4

   - uses: actions/setup-node@v4
     with:
       node-version: 20

   - name: Install
     run: npm install

   - name: Build EXE
     run: npm run build

   - uses: actions/upload-artifact@v4
     with:
       name: AeroStock-EXE
       path: dist/*.exe
